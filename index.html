<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320, initial-scale=1">
<title>Kraken Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Reset & root ─────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 320px;
    height: 320px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :root {
    --ring-color: rgba(255,255,255,0.85);
    --accent: rgba(255,255,255,0.85);
    --gauge-color: rgba(255,255,255,0.85);
  }

  #root {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    background: #050507;
  }

  /* ── Background blur from album art ───────────── */
  #bg-blur {
    position: absolute;
    inset: -40px;
    background-size: cover;
    background-position: center;
    filter: blur(38px) saturate(1.45);
    opacity: 0.42;
    transition: background-image 1.4s ease, opacity 1s ease;
    z-index: 0;
  }

  #vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 38%, transparent 22%, rgba(0,0,0,0.55) 78%, rgba(0,0,0,0.95) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* faint inner hairline — adds bezel-like definition */
  #inner-hairline {
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Outer SVG (progress ring + decorative ticks) ── */
  #ring-svg {
    position: absolute;
    inset: 0;
    width: 320px;
    height: 320px;
    z-index: 12;
    pointer-events: none;
  }

  #ring-track {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 3;
    stroke-linecap: round;
  }

  #ring-fill {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke: var(--ring-color);
    stroke-dasharray: 942.48;     /* 2π × 150 */
    stroke-dashoffset: 942.48;
    transform: rotate(-90deg);
    transform-origin: 160px 160px;
    transition: stroke-dashoffset 0.3s linear, stroke 1.2s ease, opacity 0.6s ease;
    filter: drop-shadow(0 0 4px var(--ring-color));
  }

  /* Subtle quadrant tick marks for "instrument" feel */
  .tick {
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1;
  }

  /* When stats screen is active, dim the progress ring */
  body.view-stats #ring-fill { opacity: 0.22; }
  body.view-stats #ring-track { opacity: 0.4; }

  /* ═════════════════════════════════════════════════ */
  /*  NOW PLAYING SCREEN                               */
  /* ═════════════════════════════════════════════════ */
  #now-playing {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 36px;
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.view-stats #now-playing {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  #art-wrapper {
    position: relative;
    width: 118px;
    height: 118px;
    margin-bottom: 14px;
    flex-shrink: 0;
    transition: filter 0.5s ease, transform 0.5s ease;
  }

  body.paused #art-wrapper { filter: brightness(0.65) saturate(0.7); }

  #art-glow {
    position: absolute;
    inset: -10px;
    border-radius: 14px;
    filter: blur(14px);
    opacity: 0.55;
    background: #2a2a2a;
    transition: background 1.2s ease, opacity 0.6s ease;
    z-index: 0;
  }

  #art-img {
    position: relative;
    z-index: 1;
    width: 118px;
    height: 118px;
    border-radius: 8px;
    object-fit: cover;
    display: block;
    box-shadow:
      0 8px 26px rgba(0,0,0,0.65),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #art-img.loaded { opacity: 1; }

  #track-info {
    width: 100%;
    text-align: center;
    overflow: hidden;
  }

  #track-name-wrap {
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    height: 19px;
    margin-bottom: 5px;
    /* soft fade at edges so marquee never hard-cuts */
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 10%, #000 90%, transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 10%, #000 90%, transparent 100%);
  }

  #track-name {
    display: inline-block;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.2px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.85);
    white-space: nowrap;
    padding: 0 8px;
  }

  #track-name.marquee { animation: marquee 9s linear infinite; }

  @keyframes marquee {
    0%   { transform: translateX(38%); }
    100% { transform: translateX(-100%); }
  }

  #artist-name {
    font-size: 9px;
    font-weight: 500;
    color: rgba(255,255,255,0.62);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    text-shadow: 0 1px 8px rgba(0,0,0,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 18px;
  }

  /* EQ-bar playback indicator (replaces corner status dot) */
  #playback-indicator {
    position: absolute;
    bottom: 42px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 9px;
    transition: opacity 0.4s ease;
    z-index: 6;
  }

  #playback-indicator span {
    display: block;
    width: 2px;
    background: var(--accent);
    border-radius: 2px;
    transform-origin: bottom center;
    animation: bars 1.05s ease-in-out infinite;
    box-shadow: 0 0 4px var(--accent);
  }
  #playback-indicator span:nth-child(1) { height: 5px; animation-delay: 0s; }
  #playback-indicator span:nth-child(2) { height: 9px; animation-delay: 0.18s; }
  #playback-indicator span:nth-child(3) { height: 6px; animation-delay: 0.36s; }

  @keyframes bars {
    0%, 100% { transform: scaleY(0.32); }
    50%      { transform: scaleY(1); }
  }

  body.paused #playback-indicator span {
    animation-play-state: paused;
    opacity: 0.35;
    transform: scaleY(0.4);
  }

  /* ═════════════════════════════════════════════════ */
  /*  STATS / SYSTEM SCREEN                            */
  /* ═════════════════════════════════════════════════ */
  #stats-screen {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 30px;
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.view-stats #stats-screen {
    opacity: 1;
    transform: scale(1);
  }

  .stats-header {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stats-header::before,
  .stats-header::after {
    content: "";
    width: 14px;
    height: 1px;
    background: rgba(255,255,255,0.18);
  }

  .gauge-row {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    justify-content: center;
  }

  .gauge-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 96px;
  }

  .gauge-card .label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2.4px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .value-row {
    display: flex;
    align-items: baseline;
    gap: 3px;
    line-height: 1;
  }

  .gauge-card .value {
    font-family: 'JetBrains Mono', 'DM Mono', monospace;
    font-size: 34px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -1.5px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }

  .gauge-card .unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0;
  }

  .mini-gauge {
    width: 86px;
    height: 4px;
    border-radius: 4px;
    margin-top: 12px;
    overflow: hidden;
    position: relative;
    /* faint cool→warm spectrum reference behind the fill */
    background:
      linear-gradient(90deg,
        rgba(94,200,224,0.10) 0%,
        rgba(160,216,166,0.10) 35%,
        rgba(242,195,107,0.10) 65%,
        rgba(233,69,69,0.12) 100%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .mini-gauge .fill {
    position: absolute;
    inset: 0;
    width: 0%;
    border-radius: 4px;
    background: var(--gauge-color);
    box-shadow: 0 0 8px var(--gauge-color);
    transition:
      width 0.9s cubic-bezier(0.4, 0, 0.2, 1),
      background 0.6s ease,
      box-shadow 0.6s ease;
  }

  /* Now-playing strip at bottom of stats screen — subtle "still playing" reminder */
  #stats-track-strip {
    position: absolute;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    text-align: center;
    font-size: 9px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.4s ease;
  }

  body.no-track #stats-track-strip { opacity: 0; }

  /* ═════════════════════════════════════════════════ */
  /*  IDLE / AUTH SCREEN                               */
  /* ═════════════════════════════════════════════════ */
  #idle-screen {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: radial-gradient(circle at 50% 40%, #14141d 0%, #050508 100%);
    padding: 0 28px;
    text-align: center;
  }

  #idle-screen .logo {
    font-size: 26px;
    opacity: 0.55;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }

  #idle-screen p {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    line-height: 1.55;
    max-width: 220px;
  }

  #connect-btn {
    background: #1DB954;
    border: none;
    color: #000;
    padding: 9px 20px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.4px;
    margin-top: 4px;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  #connect-btn:hover { opacity: 0.9; transform: scale(1.04); }
</style>
</head>
<body>

<div id="root">
  <div id="bg-blur"></div>
  <div id="vignette"></div>
  <div id="inner-hairline"></div>

  <!-- Outer ring + decorative tick marks at quadrants -->
  <svg id="ring-svg" viewBox="0 0 320 320">
    <circle id="ring-track" cx="160" cy="160" r="150"/>
    <circle id="ring-fill"  cx="160" cy="160" r="150"/>

    <!-- Tiny tick marks at 12, 3, 6, 9 o'clock — adds instrumented feel -->
    <line class="tick" x1="160" y1="6"   x2="160" y2="12"/>
    <line class="tick" x1="314" y1="160" x2="308" y2="160"/>
    <line class="tick" x1="160" y1="314" x2="160" y2="308"/>
    <line class="tick" x1="6"   y1="160" x2="12"  y2="160"/>
  </svg>

  <!-- ──────────── Now Playing ──────────── -->
  <div id="now-playing">
    <div id="art-wrapper">
      <div id="art-glow"></div>
      <img id="art-img" crossorigin="anonymous" src="" alt=""/>
    </div>

    <div id="track-info">
      <div id="track-name-wrap">
        <span id="track-name">—</span>
      </div>
      <div id="artist-name">—</div>
    </div>

    <div id="playback-indicator">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ──────────── System / Stats ──────────── -->
  <div id="stats-screen">
    <div class="stats-header">SYSTEM</div>

    <div class="gauge-row">
      <div class="gauge-card">
        <div class="label">CPU</div>
        <div class="value-row">
          <span class="value" id="cpu-value">—</span>
          <span class="unit">°C</span>
        </div>
        <div class="mini-gauge"><div class="fill" id="cpu-fill"></div></div>
      </div>

      <div class="gauge-card">
        <div class="label">GPU</div>
        <div class="value-row">
          <span class="value" id="gpu-value">—</span>
          <span class="unit">°C</span>
        </div>
        <div class="mini-gauge"><div class="fill" id="gpu-fill"></div></div>
      </div>
    </div>

    <div id="stats-track-strip">— · —</div>
  </div>

  <!-- ──────────── Auth / Idle ──────────── -->
  <div id="idle-screen">
    <div class="logo">♫</div>
    <p>Connect your Spotify account to start displaying now playing.</p>
    <button id="connect-btn" onclick="redirectToSpotify()">Connect Spotify</button>
  </div>
</div>

<canvas id="color-canvas" width="64" height="64" style="display:none"></canvas>

<script>
// ═══════════════════════════════════════════════════════════
//  ★  SPOTIFY CONFIG  ★
// ═══════════════════════════════════════════════════════════
const CLIENT_ID    = '50cd9a287cb54d7fb91e4c537d82563e';
const REDIRECT_URI = 'https://peat470.github.io/SpotifyKrakenDisp/';
const SCOPES       = 'user-read-currently-playing user-read-playback-state';

// ═══════════════════════════════════════════════════════════
//  ★  CYCLE TIMING  ★
// ═══════════════════════════════════════════════════════════
const NOW_PLAYING_MS = 30000; // 30s on Now Playing while music plays
const STATS_MS       = 7000;  // 7s on System screen
// When music is paused or absent, we stay on stats indefinitely.

// Temp thresholds for warning tints
const WARN_C  = 80;
const HOT_C   = 87;
const MAX_C   = 100; // for bar fill scaling

// ═══════════════════════════════════════════════════════════
//  ── PKCE helpers ──
// ═══════════════════════════════════════════════════════════
function randomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  return Array.from(crypto.getRandomValues(new Uint8Array(len)))
    .map(b => chars[b % chars.length]).join('');
}

async function sha256b64url(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function redirectToSpotify() {
  const verifier  = randomString(128);
  const challenge = await sha256b64url(verifier);
  localStorage.setItem('pkce_v', verifier);
  const p = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code',
    redirect_uri: REDIRECT_URI, scope: SCOPES,
    code_challenge_method: 'S256', code_challenge: challenge,
  });
  location.href = `https://accounts.spotify.com/authorize?${p}`;
}

async function fetchTokens(grantParams) {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id: CLIENT_ID, ...grantParams }),
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('at', d.access_token);
    localStorage.setItem('at_exp', Date.now() + d.expires_in * 1000);
    if (d.refresh_token) localStorage.setItem('rt', d.refresh_token);
  }
  return d;
}

async function validToken() {
  const exp = +localStorage.getItem('at_exp');
  if (Date.now() < exp - 60000) return localStorage.getItem('at');
  const rt = localStorage.getItem('rt');
  if (!rt) return null;
  const d = await fetchTokens({ grant_type:'refresh_token', refresh_token: rt });
  return d.access_token || null;
}

// ── Spotify API ─────────────────────────────────────────────
async function getCurrentlyPlaying() {
  const token = await validToken();
  if (!token) return { error: 'no_token' };
  const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (r.status === 204) return { empty: true };
  if (!r.ok) return { error: r.status };
  return r.json();
}

// ═══════════════════════════════════════════════════════════
//  ── Color extraction from album art ──
// ═══════════════════════════════════════════════════════════
const ccanvas = document.getElementById('color-canvas');
const cctx    = ccanvas.getContext('2d', { willReadFrequently: true });

function toHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}

async function extractPalette(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      cctx.clearRect(0,0,64,64);
      cctx.drawImage(img, 0, 0, 64, 64);
      const px = cctx.getImageData(0,0,64,64).data;

      let best = { sat:0, r:120, g:120, b:140 };
      for (let i=0; i<px.length; i+=4) {
        const r=px[i], g=px[i+1], b=px[i+2];
        const max=Math.max(r,g,b), min=Math.min(r,g,b);
        const lum=(max+min)/2;
        const sat = max===min ? 0 : (max-min)/(255-Math.abs(2*lum-255));
        if (sat > best.sat && lum > 35 && lum < 215) best = { sat, r, g, b };
      }

      const primary = toHex(best.r, best.g, best.b);
      const bgDeep  = toHex(best.r*0.16, best.g*0.16, best.b*0.16);
      const bgMid   = toHex(best.r*0.34, best.g*0.34, best.b*0.34);
      const ring    = toHex(best.r*1.35 + 35, best.g*1.35 + 35, best.b*1.35 + 35);
      resolve({ primary, bgDeep, bgMid, ring });
    };
    img.onerror = () => resolve({
      primary:'#6c5ce7', bgDeep:'#0d0b1a', bgMid:'#1d1640', ring:'#a29bfe'
    });
    img.src = url;
  });
}

// ═══════════════════════════════════════════════════════════
//  ── DOM refs ──
// ═══════════════════════════════════════════════════════════
const $bgBlur     = document.getElementById('bg-blur');
const $artGlow    = document.getElementById('art-glow');
const $artImg     = document.getElementById('art-img');
const $trackName  = document.getElementById('track-name');
const $artistName = document.getElementById('artist-name');
const $ringFill   = document.getElementById('ring-fill');
const $idleScreen = document.getElementById('idle-screen');
const $cpuValue   = document.getElementById('cpu-value');
const $gpuValue   = document.getElementById('gpu-value');
const $cpuFill    = document.getElementById('cpu-fill');
const $gpuFill    = document.getElementById('gpu-fill');
const $stripText  = document.getElementById('stats-track-strip');

const CIRC = 2 * Math.PI * 150; // 942.48

// ═══════════════════════════════════════════════════════════
//  ── State ──
// ═══════════════════════════════════════════════════════════
let lastTrackId  = null;
let tickTimer    = null;
let tickStart    = null;
let tickDuration = 1;
let isPlaying    = false;
let hasTrack     = false;
let currentRingColor = 'rgba(255,255,255,0.85)';

// ═══════════════════════════════════════════════════════════
//  ── Progress ring ticking ──
// ═══════════════════════════════════════════════════════════
function setRing(fraction) {
  const f = Math.max(0, Math.min(1, fraction));
  $ringFill.style.strokeDashoffset = CIRC * (1 - f);
}

function startTick(progressMs, durationMs) {
  if (tickTimer) clearInterval(tickTimer);
  tickStart    = Date.now() - progressMs;
  tickDuration = durationMs;
  setRing(progressMs / durationMs);
  tickTimer = setInterval(() => {
    if (!isPlaying) return;
    const elapsed = Date.now() - tickStart;
    setRing(elapsed / durationMs);
  }, 250);
}

// ═══════════════════════════════════════════════════════════
//  ── Palette application ──
// ═══════════════════════════════════════════════════════════
function applyPalette(p) {
  $bgBlur.style.background = `radial-gradient(circle at 40% 35%,
    ${p.bgMid} 0%, ${p.bgDeep} 55%, #000 100%)`;
  $artGlow.style.background = p.primary;
  currentRingColor = p.ring;
  document.documentElement.style.setProperty('--ring-color', p.ring);
  document.documentElement.style.setProperty('--accent', p.ring);
  // Gauge fill follows ring color UNTIL temps cross warn threshold
  applyGaugeColors();
}

// ═══════════════════════════════════════════════════════════
//  ── Stats / NZXT CAM hook ──
// ═══════════════════════════════════════════════════════════
let cpuTemp = null;
let gpuTemp = null;

function tempColorFor(t) {
  if (t == null) return currentRingColor;
  if (t >= HOT_C)  return '#EF4B4B';   // red
  if (t >= WARN_C) return '#F2A847';   // amber
  return currentRingColor;             // unified with album palette
}

function applyGaugeColors() {
  // Recompute fill widths + colors for whatever temps we have
  if (cpuTemp != null) {
    const pct = Math.max(2, Math.min(100, (cpuTemp / MAX_C) * 100));
    const c   = tempColorFor(cpuTemp);
    $cpuFill.style.width = pct + '%';
    $cpuFill.style.setProperty('--gauge-color', c);
    $cpuFill.style.background = c;
    $cpuFill.style.boxShadow  = `0 0 8px ${c}`;
  }
  if (gpuTemp != null) {
    const pct = Math.max(2, Math.min(100, (gpuTemp / MAX_C) * 100));
    const c   = tempColorFor(gpuTemp);
    $gpuFill.style.width = pct + '%';
    $gpuFill.style.setProperty('--gauge-color', c);
    $gpuFill.style.background = c;
    $gpuFill.style.boxShadow  = `0 0 8px ${c}`;
  }
}

function updateCpu(t) {
  cpuTemp = t;
  $cpuValue.textContent = (t == null) ? '—' : t;
  applyGaugeColors();
}
function updateGpu(t) {
  gpuTemp = t;
  $gpuValue.textContent = (t == null) ? '—' : t;
  applyGaugeColors();
}

// NZXT CAM injects this at runtime:
window.nzxt = {
  v1: {
    onMonitoringDataUpdate: (data) => {
      try {
        const { cpus, gpus } = data || {};
        if (cpus && cpus.length > 0 && cpus[0].temperature != null) {
          updateCpu(Math.round(cpus[0].temperature));
        }
        if (gpus && gpus.length > 0) {
          const max = Math.max(...gpus.map(g => g.temperature || 0));
          if (max > 0) updateGpu(Math.round(max));
        }
      } catch (e) { console.warn('NZXT data error:', e); }
    }
  }
};

// ═══════════════════════════════════════════════════════════
//  ── Spotify render ──
// ═══════════════════════════════════════════════════════════
async function render(data) {
  if (!data || data.empty || data.error) {
    isPlaying = false;
    hasTrack  = false;
    document.body.classList.add('paused', 'no-track');
    setRing(0);
    return;
  }

  const { item, is_playing, progress_ms } = data;
  if (!item) return;

  hasTrack  = true;
  isPlaying = !!is_playing;
  document.body.classList.toggle('paused', !is_playing);
  document.body.classList.remove('no-track');

  startTick(progress_ms, item.duration_ms);

  if (item.id !== lastTrackId) {
    lastTrackId = item.id;

    $trackName.textContent = item.name;
    $trackName.classList.remove('marquee');
    requestAnimationFrame(() => {
      const wrap = document.getElementById('track-name-wrap');
      if ($trackName.scrollWidth > wrap.clientWidth) {
        $trackName.classList.add('marquee');
      }
    });

    const artistText = item.artists.map(a => a.name).join(' · ');
    $artistName.textContent = artistText;
    $stripText.textContent = `${item.name} · ${artistText}`;

    const artUrl = item.album.images[0]?.url;
    if (artUrl) {
      $artImg.classList.remove('loaded');
      $bgBlur.style.backgroundImage = `url(${artUrl})`;
      const palette = await extractPalette(artUrl);
      applyPalette(palette);
      $artImg.onload = () => $artImg.classList.add('loaded');
      $artImg.src = artUrl;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  ── Screen cycling ──
// ═══════════════════════════════════════════════════════════
let viewIsStats = false;
let cycleTimer  = null;

function setView(stats) {
  viewIsStats = stats;
  document.body.classList.toggle('view-stats', stats);
}

function tickCycle() {
  // If music isn't playing (paused, no track, or error), stay on stats.
  if (!isPlaying || !hasTrack) {
    setView(true);
    cycleTimer = setTimeout(tickCycle, 4000); // re-check periodically
    return;
  }
  // Toggle
  setView(!viewIsStats);
  cycleTimer = setTimeout(tickCycle, viewIsStats ? STATS_MS : NOW_PLAYING_MS);
}

function startCycle() {
  if (cycleTimer) clearTimeout(cycleTimer);
  setView(false); // start on Now Playing
  cycleTimer = setTimeout(tickCycle, NOW_PLAYING_MS);
}

// ═══════════════════════════════════════════════════════════
//  ── Main loop ──
// ═══════════════════════════════════════════════════════════
async function poll() {
  try {
    const data = await getCurrentlyPlaying();
    if (data?.error === 'no_token') return;
    await render(data);
  } catch (e) {
    console.warn('Poll error:', e);
  }
}

async function init() {
  const params = new URLSearchParams(location.search);
  const code   = params.get('code');

  if (code) {
    history.replaceState({}, '', '/');
    await fetchTokens({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      code_verifier: localStorage.getItem('pkce_v') || '',
    });
  }

  if (localStorage.getItem('rt')) {
    $idleScreen.style.display = 'none';
    await poll();
    setInterval(poll, 3000);
    startCycle();
  }
}

window.redirectToSpotify = redirectToSpotify;
init();
</script>
