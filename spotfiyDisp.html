<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480, initial-scale=1">
<title>Now Playing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 480px;
    height: 480px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Root circle ───────────────────────────────── */
  #root {
    width: 480px;
    height: 480px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    background: #0a0a0a;
  }

  /* ── Blurred background ───────────────────────── */
  #bg-blur {
    position: absolute;
    inset: -40px;
    background-size: cover;
    background-position: center;
    filter: blur(40px) saturate(1.6);
    opacity: 0.55;
    transition: background-image 1.2s ease, opacity 0.8s ease;
    z-index: 0;
  }

  /* ── Radial vignette overlay ──────────────────── */
  #vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center,
      transparent 30%,
      rgba(0,0,0,0.45) 70%,
      rgba(0,0,0,0.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* ── Progress ring SVG ────────────────────────── */
  #ring-svg {
    position: absolute;
    inset: 0;
    width: 480px;
    height: 480px;
    z-index: 10;
    pointer-events: none;
  }

  #ring-track {
    stroke: rgba(255,255,255,0.08);
    stroke-width: 5;
    fill: none;
    stroke-linecap: round;
  }

  #ring-fill {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    stroke: rgba(255,255,255,0.9);
    stroke-dasharray: 1382.3;
    stroke-dashoffset: 1382.3;
    transform: rotate(-90deg);
    transform-origin: 240px 240px;
    transition: stroke-dashoffset 0.28s linear, stroke 1.2s ease;
  }

  /* ── Main content ─────────────────────────────── */
  #content {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0 52px;
  }

  /* ── Album art ────────────────────────────────── */
  #art-wrapper {
    position: relative;
    width: 188px;
    height: 188px;
    margin-bottom: 18px;
    flex-shrink: 0;
  }

  #art-glow {
    position: absolute;
    inset: -12px;
    border-radius: 18px;
    filter: blur(16px);
    opacity: 0.6;
    background: #333;
    transition: background 1.2s ease;
    z-index: 0;
  }

  #art-img {
    position: relative;
    z-index: 1;
    width: 188px;
    height: 188px;
    border-radius: 14px;
    object-fit: cover;
    display: block;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #art-img.loaded { opacity: 1; }

  /* ── Track info ───────────────────────────────── */
  #track-info {
    width: 100%;
    text-align: center;
    overflow: hidden;
  }

  #track-name-wrap {
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    height: 30px;
    margin-bottom: 5px;
  }

  #track-name {
    display: inline-block;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    white-space: nowrap;
    padding: 0 8px;
  }

  #track-name.marquee {
    animation: marquee 8s linear infinite;
  }

  @keyframes marquee {
    0%   { transform: translateX(40%); }
    100% { transform: translateX(-100%); }
  }

  #artist-name {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Time display ─────────────────────────────── */
  #time-row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-top: 12px;
    padding: 0 4px;
  }

  #time-current, #time-total {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
  }

  /* ── Idle / Auth screens ──────────────────────── */
  #idle-screen {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: radial-gradient(circle at center, #1a1a2a 0%, #050508 100%);
  }

  #idle-screen .logo {
    font-size: 36px;
    opacity: 0.5;
  }

  #idle-screen p {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 0 40px;
    line-height: 1.5;
  }

  #connect-btn {
    background: #1DB954;
    border: none;
    color: #000;
    padding: 12px 28px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.3px;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  #connect-btn:hover { opacity: 0.9; transform: scale(1.04); }

  #paused-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    z-index: 8;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(6px);
  }

  #paused-badge.visible { transform: translate(-50%, -50%) scale(1); }

  #status-dot {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #1DB954;
    z-index: 15;
    transition: background 0.5s ease;
    box-shadow: 0 0 6px #1DB954;
  }

  #status-dot.paused { background: rgba(255,255,255,0.25); box-shadow: none; }
</style>
</head>
<body>

<div id="root">
  <!-- Dynamic blurred background -->
  <div id="bg-blur"></div>
  <div id="vignette"></div>

  <!-- Progress ring -->
  <svg id="ring-svg" viewBox="0 0 480 480">
    <circle id="ring-track" cx="240" cy="240" r="220"/>
    <circle id="ring-fill"  cx="240" cy="240" r="220"/>
  </svg>

  <!-- Status dot (green = playing) -->
  <div id="status-dot"></div>

  <!-- Paused overlay icon -->
  <div id="paused-badge">⏸</div>

  <!-- Main content -->
  <div id="content">
    <div id="art-wrapper">
      <div id="art-glow"></div>
      <img id="art-img" crossorigin="anonymous" src="" alt="Album Art"/>
    </div>

    <div id="track-info">
      <div id="track-name-wrap">
        <span id="track-name">—</span>
      </div>
      <div id="artist-name">—</div>
    </div>

    <div id="time-row">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <!-- Auth / idle overlay -->
  <div id="idle-screen">
    <div class="logo">♫</div>
    <p>Connect your Spotify account to start displaying now playing.</p>
    <button id="connect-btn" onclick="redirectToSpotify()">Connect Spotify</button>
  </div>
</div>

<!-- Hidden canvas for color extraction -->
<canvas id="color-canvas" width="64" height="64" style="display:none"></canvas>

<script>
// ═══════════════════════════════════════════════════════════
//  ★  SPOTIFY CONFIG  ★
// ═══════════════════════════════════════════════════════════
const CLIENT_ID    = '50cd9a287cb54d7fb91e4c537d82563e';
const REDIRECT_URI = 'https://peat470.github.io/SpotifyKrakenDisp/';
const SCOPES       = 'user-read-currently-playing user-read-playback-state';
// ═══════════════════════════════════════════════════════════

// ── PKCE helpers ─────────────────────────────────────────
function randomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  return Array.from(crypto.getRandomValues(new Uint8Array(len)))
    .map(b => chars[b % chars.length]).join('');
}

async function sha256b64url(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function redirectToSpotify() {
  const verifier  = randomString(128);
  const challenge = await sha256b64url(verifier);
  localStorage.setItem('pkce_v', verifier);
  const p = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code',
    redirect_uri: REDIRECT_URI, scope: SCOPES,
    code_challenge_method: 'S256', code_challenge: challenge,
  });
  location.href = `https://accounts.spotify.com/authorize?${p}`;
}

async function fetchTokens(grantParams) {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id: CLIENT_ID, ...grantParams }),
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('at', d.access_token);
    localStorage.setItem('at_exp', Date.now() + d.expires_in * 1000);
    if (d.refresh_token) localStorage.setItem('rt', d.refresh_token);
  }
  return d;
}

async function validToken() {
  const exp = +localStorage.getItem('at_exp');
  if (Date.now() < exp - 60000) return localStorage.getItem('at');
  const rt = localStorage.getItem('rt');
  if (!rt) return null;
  const d = await fetchTokens({ grant_type:'refresh_token', refresh_token: rt });
  return d.access_token || null;
}

// ── Spotify API ───────────────────────────────────────────
async function getCurrentlyPlaying() {
  const token = await validToken();
  if (!token) return { error: 'no_token' };
  const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (r.status === 204) return { empty: true };
  if (!r.ok) return { error: r.status };
  return r.json();
}

// ── Color extraction ──────────────────────────────────────
const ccanvas = document.getElementById('color-canvas');
const cctx    = ccanvas.getContext('2d', { willReadFrequently: true });

function toHex(r,g,b) {
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

async function extractPalette(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      cctx.clearRect(0,0,64,64);
      cctx.drawImage(img, 0, 0, 64, 64);
      const px = cctx.getImageData(0,0,64,64).data;

      let best = { sat:0, r:60, g:60, b:80 };
      let dark = { lum:999, r:20, g:20, b:30 };
      let light = { lum:0,  r:200, g:200, b:220 };

      for (let i=0; i<px.length; i+=4) {
        const r=px[i], g=px[i+1], b=px[i+2];
        const max=Math.max(r,g,b), min=Math.min(r,g,b);
        const lum=(max+min)/2;
        const sat = max===min ? 0 : (max-min)/(255-Math.abs(2*lum-255));

        if (sat > best.sat && lum > 30 && lum < 220) {
          best = { sat, r, g, b };
        }
        if (lum < dark.lum) dark = { lum, r, g, b };
        if (lum > light.lum) light = { lum, r, g, b };
      }

      const primary   = toHex(best.r, best.g, best.b);
      const bgDeep    = toHex(Math.round(best.r*0.18), Math.round(best.g*0.18), Math.round(best.b*0.18));
      const bgMid     = toHex(Math.round(best.r*0.35), Math.round(best.g*0.35), Math.round(best.b*0.35));
      const ringR = Math.min(255, Math.round(best.r * 1.4 + 40));
      const ringG = Math.min(255, Math.round(best.g * 1.4 + 40));
      const ringB = Math.min(255, Math.round(best.b * 1.4 + 40));
      const ring  = toHex(ringR, ringG, ringB);

      resolve({ primary, bgDeep, bgMid, ring, raw: [best.r, best.g, best.b] });
    };
    img.onerror = () => resolve({
      primary:'#6c5ce7', bgDeep:'#0d0b1a', bgMid:'#1d1640', ring:'#a29bfe', raw:[108,92,231]
    });
    img.src = url;
  });
}

// ── DOM refs ──────────────────────────────────────────────
const $bgBlur      = document.getElementById('bg-blur');
const $artGlow     = document.getElementById('art-glow');
const $artImg      = document.getElementById('art-img');
const $trackName   = document.getElementById('track-name');
const $artistName  = document.getElementById('artist-name');
const $ringFill    = document.getElementById('ring-fill');
const $statusDot   = document.getElementById('status-dot');
const $pausedBadge = document.getElementById('paused-badge');
const $idleScreen  = document.getElementById('idle-screen');
const $timeCurrent = document.getElementById('time-current');
const $timeTotal   = document.getElementById('time-total');

const CIRC = 2 * Math.PI * 220; // 1382.3

function formatTime(ms) {
  const s = Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── State ─────────────────────────────────────────────────
let lastTrackId   = null;
let tickTimer     = null;
let tickStart     = null;
let tickProgress  = 0;
let tickDuration  = 1;
let isPlaying     = false;

function setRing(fraction) {
  const offset = CIRC * (1 - Math.min(Math.max(fraction, 0), 1));
  $ringFill.style.strokeDashoffset = offset;
  const elapsed = fraction * tickDuration;
  $timeCurrent.textContent = formatTime(elapsed);
}

function startTick(progressMs, durationMs) {
  if (tickTimer) clearInterval(tickTimer);
  tickStart    = Date.now() - progressMs;
  tickDuration = durationMs;
  tickProgress = progressMs;
  $timeTotal.textContent = formatTime(durationMs);

  tickTimer = setInterval(() => {
    if (!isPlaying) return;
    const elapsed = Date.now() - tickStart;
    setRing(elapsed / durationMs);
  }, 200);
}

function applyPalette(p) {
  $bgBlur.style.background = `radial-gradient(circle at 40% 35%,
    ${p.bgMid} 0%, ${p.bgDeep} 55%, #000 100%)`;
  $artGlow.style.background = p.primary;
  $ringFill.style.stroke = p.ring;
}

async function render(data) {
  if (!data || data.empty || data.error) {
    isPlaying = false;
    $pausedBadge.classList.add('visible');
    $statusDot.classList.add('paused');
    return;
  }

  const { item, is_playing, progress_ms } = data;
  if (!item) return;

  isPlaying = is_playing;
  $pausedBadge.classList.toggle('visible', !is_playing);
  $statusDot.classList.toggle('paused', !is_playing);

  startTick(progress_ms, item.duration_ms);

  if (item.id !== lastTrackId) {
    lastTrackId = item.id;

    $trackName.textContent = item.name;
    $trackName.classList.remove('marquee');

    requestAnimationFrame(() => {
      const wrap = document.getElementById('track-name-wrap');
      if ($trackName.scrollWidth > wrap.clientWidth) {
        $trackName.classList.add('marquee');
      }
    });

    $artistName.textContent = item.artists.map(a => a.name).join(' · ');

    const artUrl = item.album.images[0]?.url;
    if (artUrl) {
      $artImg.classList.remove('loaded');
      $bgBlur.style.backgroundImage = `url(${artUrl})`;
      const palette = await extractPalette(artUrl);
      applyPalette(palette);
      $artImg.onload = () => $artImg.classList.add('loaded');
      $artImg.src = artUrl;
    }
  }
}

// ── Main loop ─────────────────────────────────────────────
async function poll() {
  try {
    const data = await getCurrentlyPlaying();
    if (data?.error === 'no_token') return;
    await render(data);
  } catch(e) {
    console.warn('Poll error:', e);
  }
}

async function init() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  if (code) {
    history.replaceState({}, '', '/');
    await fetchTokens({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      code_verifier: localStorage.getItem('pkce_v') || '',
    });
  }

  if (localStorage.getItem('rt')) {
    $idleScreen.style.display = 'none';
    await poll();
    setInterval(poll, 3000);
  }
}

window.redirectToSpotify = redirectToSpotify;
init();
</script>
</body>
</html>
