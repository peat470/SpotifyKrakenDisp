<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320, initial-scale=1">
<title>Kraken Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ──────────────────────────────────────────────────────────
     Reset & root.  Tuned for ~9 FPS LCD on Kraken Z3:
     transitions are durations of N × 111ms, animations use
     transform/opacity only, filters/shadows kept light.
     ────────────────────────────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 320px;
    height: 320px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :root {
    --ring-color: rgba(255,255,255,0.85);
    --accent: rgba(255,255,255,0.85);
  }

  #root {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    background: #050507;
  }

  /* ── Background blur (static between track changes) ── */
  #bg-blur {
    position: absolute;
    inset: -30px;
    background-size: cover;
    background-position: center;
    filter: blur(22px) saturate(1.4);
    opacity: 0.42;
    transition: background-image 1.111s linear, opacity 0.888s linear;
    z-index: 0;
    /* Promote to its own layer once and stay there */
    transform: translateZ(0);
  }

  #vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 38%,
        transparent 22%,
        rgba(0,0,0,0.55) 78%,
        rgba(0,0,0,0.95) 100%);
    z-index: 1;
    pointer-events: none;
  }

  #inner-hairline {
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Outer SVG (progress ring + decorative ticks) ── */
  #ring-svg {
    position: absolute;
    inset: 0;
    width: 320px;
    height: 320px;
    z-index: 12;
    pointer-events: none;
  }

  #ring-track {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 3;
    stroke-linecap: round;
  }

  /* No drop-shadow filter on the ring — that re-rasterises
     every paint and is the most expensive thing we could do. */
  #ring-fill {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke: var(--ring-color);
    stroke-dasharray: 942.48;     /* 2π × 150 */
    stroke-dashoffset: 942.48;
    transform: rotate(-90deg);
    transform-origin: 160px 160px;
    transition:
      stroke-dashoffset 0.333s linear,
      stroke 1.111s linear,
      opacity 0.555s linear;
  }

  .tick {
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1;
  }

  body.view-stats #ring-fill { opacity: 0.22; }
  body.view-stats #ring-track { opacity: 0.4; }

  /* ══════════════════════════════════════════════════════════
     NOW PLAYING SCREEN
     ══════════════════════════════════════════════════════════ */
  /* Layout strategy: the album art is anchored at the
     geometric centre of the screen (160, 160).  Track name &
     artist sit absolutely positioned just below it.  No flex
     column — the image is always at centre regardless of
     whatever else is on screen. */
  #now-playing {
    position: absolute;
    inset: 0;
    z-index: 5;
    will-change: opacity, transform;
    transition: opacity 0.555s linear, transform 0.555s linear;
  }

  body.view-stats #now-playing {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  #art-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 128px;
    height: 128px;
    transform: translate(-50%, -50%);
    transition: opacity 0.444s linear;
  }

  /* Cheap pause indicator: dim the album art (opacity, no filter) */
  body.paused #art-wrapper { opacity: 0.55; }

  #art-glow {
    position: absolute;
    inset: -8px;
    border-radius: 14px;
    filter: blur(10px);
    opacity: 0.5;
    background: #2a2a2a;
    transition: background 1.111s linear;
    z-index: 0;
  }

  /* Placeholder card shown when the current source provides
     no album art (e.g. YouTube via SMTC sometimes).  Sits in
     the same spot as the album image, neutral dark surface. */
  #art-placeholder {
    position: absolute;
    inset: 0;
    z-index: 0;
    border-radius: 9px;
    background: linear-gradient(135deg, #2a2a2a 0%, #161616 100%);
    box-shadow:
      0 4px 14px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    color: rgba(255,255,255,0.22);
    opacity: 0;
    transition: opacity 0.555s linear;
  }

  #art-img {
    position: relative;
    z-index: 1;
    width: 128px;
    height: 128px;
    border-radius: 9px;
    object-fit: cover;
    display: block;
    box-shadow:
      0 4px 14px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    opacity: 0;
    transition: opacity 0.555s linear;
  }
  #art-img.loaded { opacity: 1; }

  /* When no art is available, hide the img and reveal the
     placeholder.  Source-order specificity wins ties, so this
     overrides the .loaded rule above. */
  body.no-art #art-img         { opacity: 0; }
  body.no-art #art-placeholder { opacity: 1; }
  body.no-art #art-glow        { opacity: 0; }

  /* Sits just below the centred album art.
     Width 200px keeps the artist line within the visible chord
     of the circle at this y position. */
  #track-info {
    position: absolute;
    top: calc(50% + 72px);   /* image half-height (64) + 8px gap */
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    text-align: center;
    overflow: hidden;
  }

  #track-name-wrap {
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    height: 19px;
    margin-bottom: 5px;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 10%, #000 90%, transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 10%, #000 90%, transparent 100%);
  }

  #track-name {
    display: inline-block;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.2px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.85);
    white-space: nowrap;
    padding: 0 8px;
    will-change: transform;
  }

  /* Marquee uses translate3d so the whole layer composites on GPU.
     Linear motion looks smooth even when sampled at 9fps. */
  #track-name.marquee { animation: marquee 9s linear infinite; }

  @keyframes marquee {
    0%   { transform: translate3d(38%, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
  }

  #artist-name {
    font-size: 9px;
    font-weight: 500;
    color: rgba(255,255,255,0.62);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 8px;
  }

  /* ══════════════════════════════════════════════════════════
     STATS / SYSTEM SCREEN
     Layout strategy: the LARGE temp values are anchored at
     the geometric centre of the circle (y = 160).
     Labels sit absolutely above each value, mini-bars below.
     The card's bounding box equals the value-row only, so
     centring the row centres the numbers — not the column.
     ══════════════════════════════════════════════════════════ */
  #stats-screen {
    position: absolute;
    inset: 0;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.555s linear;
  }

  body.view-stats #stats-screen { opacity: 1; }

  .gauge-row {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .gauge-card {
    position: relative;
    /* card height = value-row only.  Label & bar are absolute. */
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 3px;
    line-height: 1;
    width: 92px;
  }

  .gauge-card .label {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2.4px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .gauge-card .value {
    font-family: 'JetBrains Mono', 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -1.5px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  .gauge-card .unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
  }

  .mini-gauge {
    position: absolute;
    top: calc(100% + 14px);
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    border-radius: 4px;
    overflow: hidden;
    background:
      linear-gradient(90deg,
        rgba(94,200,224,0.10) 0%,
        rgba(160,216,166,0.10) 35%,
        rgba(242,195,107,0.10) 65%,
        rgba(233,69,69,0.12) 100%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .mini-gauge .fill {
    position: absolute;
    inset: 0;
    width: 0%;
    border-radius: 4px;
    background: var(--gauge-color, rgba(255,255,255,0.85));
    box-shadow: 0 0 4px var(--gauge-color, rgba(255,255,255,0.85));
    will-change: width;
    transition:
      width 0.777s cubic-bezier(0.4, 0, 0.2, 1),
      background 0.555s linear,
      box-shadow 0.555s linear;
  }

  /* Subtle "still playing" reminder along the bottom of the
     stats screen.  Long titles get a soft-faded marquee. */
  #stats-track-strip {
    position: absolute;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 12px;
    line-height: 12px;
    overflow: hidden;
    white-space: nowrap;
    text-align: center;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 18%, #000 82%, transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 18%, #000 82%, transparent 100%);
    transition: opacity 0.444s linear;
    /* Promote to its own composite layer once, stay there. */
    transform: translate3d(-50%, 0, 0);
  }

  #stats-track-text {
    display: inline-block;
    vertical-align: top;
    font-size: 9px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    white-space: nowrap;
    padding: 0 10px;
    will-change: transform;
    /* backface-visibility hint helps some compositors keep the
       layer rasterised once, then just transform it per frame. */
    backface-visibility: hidden;
  }

  /* Only animate when JS confirms the text actually overflows.
     Duration is exactly 120 frames at 9fps (120 × 111ms = 13.32s)
     so each loop completes on a clean frame boundary — no
     half-pixel drift between cycles. */
  #stats-track-text.marquee {
    animation: marquee-strip 13.32s linear infinite;
  }

  @keyframes marquee-strip {
    0%   { transform: translate3d(38%, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
  }

  body.no-track #stats-track-strip { opacity: 0; }

  /* ══════════════════════════════════════════════════════════
     IDLE / AUTH
     ══════════════════════════════════════════════════════════ */
  #idle-screen {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: radial-gradient(circle at 50% 40%, #14141d 0%, #050508 100%);
    padding: 0 28px;
    text-align: center;
  }

  #idle-screen .logo {
    font-size: 26px;
    opacity: 0.55;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }

  #idle-screen p {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    line-height: 1.55;
    max-width: 220px;
  }

  #connect-btn {
    background: #1DB954;
    border: none;
    color: #000;
    padding: 9px 20px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.4px;
    margin-top: 4px;
    transition: opacity 0.222s linear;
  }
  #connect-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div id="root">
  <div id="bg-blur"></div>
  <div id="vignette"></div>
  <div id="inner-hairline"></div>

  <svg id="ring-svg" viewBox="0 0 320 320">
    <circle id="ring-track" cx="160" cy="160" r="150"/>
    <circle id="ring-fill"  cx="160" cy="160" r="150"/>

    <!-- Quadrant tick marks at 12, 3, 6, 9 o'clock -->
    <line class="tick" x1="160" y1="6"   x2="160" y2="12"/>
    <line class="tick" x1="314" y1="160" x2="308" y2="160"/>
    <line class="tick" x1="160" y1="314" x2="160" y2="308"/>
    <line class="tick" x1="6"   y1="160" x2="12"  y2="160"/>
  </svg>

  <!-- ──────────── Now Playing ──────────── -->
  <div id="now-playing">
    <div id="art-wrapper">
      <div id="art-glow"></div>
      <div id="art-placeholder">♫</div>
      <img id="art-img" crossorigin="anonymous" src="" alt=""/>
    </div>

    <div id="track-info">
      <div id="track-name-wrap"><span id="track-name">—</span></div>
      <div id="artist-name">—</div>
    </div>
  </div>

  <!-- ──────────── System / Stats ──────────── -->
  <div id="stats-screen">
    <div class="gauge-row">
      <div class="gauge-card">
        <div class="label">CPU</div>
        <span class="value" id="cpu-value">—</span>
        <span class="unit">°C</span>
        <div class="mini-gauge"><div class="fill" id="cpu-fill"></div></div>
      </div>

      <div class="gauge-card">
        <div class="label">GPU</div>
        <span class="value" id="gpu-value">—</span>
        <span class="unit">°C</span>
        <div class="mini-gauge"><div class="fill" id="gpu-fill"></div></div>
      </div>
    </div>

    <div id="stats-track-strip">
      <span id="stats-track-text">— · —</span>
    </div>
  </div>

  <!-- ──────────── Auth / Idle ──────────── -->
  <div id="idle-screen">
    <div class="logo">♫</div>
    <p>Connect your Spotify account to start displaying now playing.</p>
    <button id="connect-btn" onclick="redirectToSpotify()">Connect Spotify</button>
  </div>
</div>

<canvas id="color-canvas" width="48" height="48" style="display:none"></canvas>

<script>
// ═══════════════════════════════════════════════════════════
//  SPOTIFY CONFIG
// ═══════════════════════════════════════════════════════════
const CLIENT_ID    = '50cd9a287cb54d7fb91e4c537d82563e';
const REDIRECT_URI = 'https://peat470.github.io/SpotifyKrakenDisp/';
const SCOPES       = 'user-read-currently-playing user-read-playback-state';

// ═══════════════════════════════════════════════════════════
//  SMTC FALLBACK (local helper bridge)
//   • Reads Windows System Media Transport Controls — captures
//     YouTube tabs, browser audio, VLC, anything that registers
//     with the OS media keys.
//   • Requires the KrakenMedia.ps1 bridge running on the PC.
//   • If the bridge isn't reachable we silently degrade to
//     Spotify-only behaviour.
// ═══════════════════════════════════════════════════════════
const SMTC_ENABLED = true;
const SMTC_URL     = 'http://localhost:9876/';

// ═══════════════════════════════════════════════════════════
//  CYCLE TIMING
//   • While playing: 30s Now Playing, 7s System, repeat
//   • Pause detected: wait 3s, then switch to System (and stay)
//   • Resume: switch back to Now Playing immediately
//   • No track at all: stay on System
// ═══════════════════════════════════════════════════════════
const NOW_PLAYING_MS = 30000;
const STATS_MS       = 7000;
const PAUSE_DELAY_MS = 3000;

// Temp tinting thresholds
const WARN_C  = 80;
const HOT_C   = 87;
const MAX_C   = 100;

// Ring update cadence — aligned to a multiple of the 111ms screen frame.
const RING_TICK_MS = 333;

// ═══════════════════════════════════════════════════════════
//  PKCE auth helpers (unchanged from working build)
// ═══════════════════════════════════════════════════════════
function randomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  return Array.from(crypto.getRandomValues(new Uint8Array(len)))
    .map(b => chars[b % chars.length]).join('');
}

async function sha256b64url(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function redirectToSpotify() {
  const verifier  = randomString(128);
  const challenge = await sha256b64url(verifier);
  localStorage.setItem('pkce_v', verifier);
  const p = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code',
    redirect_uri: REDIRECT_URI, scope: SCOPES,
    code_challenge_method: 'S256', code_challenge: challenge,
  });
  location.href = `https://accounts.spotify.com/authorize?${p}`;
}

async function fetchTokens(grantParams) {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id: CLIENT_ID, ...grantParams }),
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('at', d.access_token);
    localStorage.setItem('at_exp', Date.now() + d.expires_in * 1000);
    if (d.refresh_token) localStorage.setItem('rt', d.refresh_token);
  }
  return d;
}

async function validToken() {
  const exp = +localStorage.getItem('at_exp');
  if (Date.now() < exp - 60000) return localStorage.getItem('at');
  const rt = localStorage.getItem('rt');
  if (!rt) return null;
  const d = await fetchTokens({ grant_type:'refresh_token', refresh_token: rt });
  return d.access_token || null;
}

async function getCurrentlyPlaying() {
  const token = await validToken();
  if (!token) return { error: 'no_token' };
  const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (r.status === 204) return { empty: true };
  if (!r.ok) return { error: r.status };
  return r.json();
}

// ── SMTC bridge fetch ───────────────────────────────────────
// Returns null if the bridge isn't running (we degrade silently).
let smtcWarned = false;
async function getSmtcMedia() {
  if (!SMTC_ENABLED) return null;
  try {
    const r = await fetch(SMTC_URL, { cache: 'no-store' });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) {
    if (!smtcWarned) {
      console.info('[KrakenDisp] SMTC bridge not reachable. Spotify-only mode.');
      smtcWarned = true;
    }
    return null;
  }
}

// Adapter: SMTC payload → the same shape our render() already expects
// from Spotify, so we only need one rendering path.
function smtcToSpotifyShape(s) {
  if (!s || !s.has_session || !s.title) return { empty: true };

  const artists = s.artist
    ? s.artist.split(/\s*[·,;\/]\s*/).filter(Boolean).map(name => ({ name }))
    : [];

  return {
    item: {
      id:          s.track_id,
      name:        s.title,
      artists:     artists.length ? artists : [{ name: '' }],
      album:       { images: s.thumbnail ? [{ url: s.thumbnail }] : [] },
      duration_ms: Math.max(1, Math.round((s.duration_s || 0) * 1000))
    },
    is_playing:  !!s.playing,
    progress_ms: Math.round((s.position_s || 0) * 1000),
    _source:     'smtc'
  };
}

// ═══════════════════════════════════════════════════════════
//  Colour extraction — tiny 48×48 sample, runs once per track.
// ═══════════════════════════════════════════════════════════
const ccanvas = document.getElementById('color-canvas');
const cctx    = ccanvas.getContext('2d', { willReadFrequently: true });

function toHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}

async function extractPalette(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      cctx.clearRect(0,0,48,48);
      cctx.drawImage(img, 0, 0, 48, 48);
      const px = cctx.getImageData(0,0,48,48).data;

      let best = { sat:0, r:120, g:120, b:140 };
      // Step by 2 pixels to halve the work — 48x48/2 = 1152 samples, plenty.
      for (let i=0; i<px.length; i+=8) {
        const r=px[i], g=px[i+1], b=px[i+2];
        const max=Math.max(r,g,b), min=Math.min(r,g,b);
        const lum=(max+min)/2;
        const sat = max===min ? 0 : (max-min)/(255-Math.abs(2*lum-255));
        if (sat > best.sat && lum > 35 && lum < 215) best = { sat, r, g, b };
      }

      const primary = toHex(best.r, best.g, best.b);
      const bgDeep  = toHex(best.r*0.16, best.g*0.16, best.b*0.16);
      const bgMid   = toHex(best.r*0.34, best.g*0.34, best.b*0.34);
      const ring    = toHex(best.r*1.35 + 35, best.g*1.35 + 35, best.b*1.35 + 35);
      resolve({ primary, bgDeep, bgMid, ring });
    };
    img.onerror = () => resolve({
      primary:'#6c5ce7', bgDeep:'#0d0b1a', bgMid:'#1d1640', ring:'#a29bfe'
    });
    img.src = url;
  });
}

// ═══════════════════════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════════════════════
const $bgBlur     = document.getElementById('bg-blur');
const $artGlow    = document.getElementById('art-glow');
const $artImg     = document.getElementById('art-img');
const $trackName  = document.getElementById('track-name');
const $artistName = document.getElementById('artist-name');
const $ringFill   = document.getElementById('ring-fill');
const $idleScreen = document.getElementById('idle-screen');
const $cpuValue   = document.getElementById('cpu-value');
const $gpuValue   = document.getElementById('gpu-value');
const $cpuFill    = document.getElementById('cpu-fill');
const $gpuFill    = document.getElementById('gpu-fill');
const $stripWrap  = document.getElementById('stats-track-strip');
const $stripText  = document.getElementById('stats-track-text');

const CIRC = 942.48; // 2π × 150

// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
let lastTrackId  = null;
let tickTimer    = null;
let tickStart    = null;
let tickDuration = 1;
let isPlaying    = false;
let prevPlaying  = false;
let hasTrack     = false;
let currentRingColor = 'rgba(255,255,255,0.85)';

// Cycle / pause timers
let cycleTimer     = null;
let pauseTimer     = null;
let viewIsStats    = false;
let firstRenderDone = false;

// ═══════════════════════════════════════════════════════════
//  Progress ring tick
// ═══════════════════════════════════════════════════════════
function setRing(fraction) {
  const f = fraction < 0 ? 0 : fraction > 1 ? 1 : fraction;
  $ringFill.style.strokeDashoffset = CIRC * (1 - f);
}

function startTick(progressMs, durationMs) {
  if (tickTimer) clearInterval(tickTimer);
  tickStart    = Date.now() - progressMs;
  tickDuration = durationMs;
  setRing(progressMs / durationMs);
  tickTimer = setInterval(() => {
    if (!isPlaying) return;
    setRing((Date.now() - tickStart) / durationMs);
  }, RING_TICK_MS);
}

// ═══════════════════════════════════════════════════════════
//  Palette → CSS variables
// ═══════════════════════════════════════════════════════════
function applyPalette(p) {
  $bgBlur.style.background = `radial-gradient(circle at 40% 35%,
    ${p.bgMid} 0%, ${p.bgDeep} 55%, #000 100%)`;
  $artGlow.style.background = p.primary;
  currentRingColor = p.ring;
  document.documentElement.style.setProperty('--ring-color', p.ring);
  document.documentElement.style.setProperty('--accent', p.ring);
  applyGaugeColors();
}

// Neutral palette used when the active source has no album art
// — keeps the screen from inheriting colour from the previous
// source (e.g. last Spotify track) when YouTube takes over with
// no thumbnail data.
function applyDefaultPalette() {
  applyPalette({
    primary: '#666666',
    bgDeep:  '#0a0a0a',
    bgMid:   '#161616',
    ring:    '#aaaaaa'
  });
}

// ═══════════════════════════════════════════════════════════
//  Stats / NZXT CAM hook
// ═══════════════════════════════════════════════════════════
let cpuTemp = null;
let gpuTemp = null;

function tempColorFor(t) {
  if (t == null) return currentRingColor;
  if (t >= HOT_C)  return '#EF4B4B';
  if (t >= WARN_C) return '#F2A847';
  return currentRingColor;
}

function paintFill(el, t) {
  if (t == null) return;
  const pct = t < 2 ? 2 : t > MAX_C ? 100 : (t / MAX_C) * 100;
  const c   = tempColorFor(t);
  el.style.width = pct + '%';
  el.style.background = c;
  el.style.boxShadow  = `0 0 4px ${c}`;
}

function applyGaugeColors() {
  paintFill($cpuFill, cpuTemp);
  paintFill($gpuFill, gpuTemp);
}

function updateCpu(t) {
  cpuTemp = t;
  $cpuValue.textContent = (t == null) ? '—' : t;
  paintFill($cpuFill, t);
}
function updateGpu(t) {
  gpuTemp = t;
  $gpuValue.textContent = (t == null) ? '—' : t;
  paintFill($gpuFill, t);
}

// NZXT CAM injects monitoring data here
window.nzxt = {
  v1: {
    onMonitoringDataUpdate: (data) => {
      try {
        const { cpus, gpus } = data || {};
        if (cpus && cpus.length > 0 && cpus[0].temperature != null) {
          updateCpu(Math.round(cpus[0].temperature));
        }
        if (gpus && gpus.length > 0) {
          const max = Math.max(...gpus.map(g => g.temperature || 0));
          if (max > 0) updateGpu(Math.round(max));
        }
      } catch (e) { console.warn('NZXT data error:', e); }
    }
  }
};

// ═══════════════════════════════════════════════════════════
//  Screen cycling + pause behaviour
// ═══════════════════════════════════════════════════════════
function setView(stats) {
  if (viewIsStats === stats) return;
  viewIsStats = stats;
  document.body.classList.toggle('view-stats', stats);
}

function clearCycle() {
  if (cycleTimer) { clearTimeout(cycleTimer); cycleTimer = null; }
}
function clearPauseTimer() {
  if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
}

function scheduleNextCycleFrame() {
  clearCycle();
  cycleTimer = setTimeout(() => {
    if (!isPlaying) return;            // safety: only cycle while playing
    setView(!viewIsStats);
    scheduleNextCycleFrame();
  }, viewIsStats ? STATS_MS : NOW_PLAYING_MS);
}

function onPlaybackTransition() {
  // Called only on play↔pause edges (and when track availability changes).
  clearCycle();
  clearPauseTimer();

  if (!hasTrack) {
    setView(true);   // no track at all → stay on stats
    return;
  }

  if (isPlaying) {
    setView(false);                    // resumed → back to Now Playing
    scheduleNextCycleFrame();
  } else {
    // Just paused.  If we're already on stats, stay; otherwise wait 3s.
    if (viewIsStats) return;
    pauseTimer = setTimeout(() => {
      setView(true);
      pauseTimer = null;
    }, PAUSE_DELAY_MS);
  }
}

// ═══════════════════════════════════════════════════════════
//  Spotify render
// ═══════════════════════════════════════════════════════════
async function render(data) {
  let nowHasTrack = true;
  let nowPlaying  = false;

  if (!data || data.empty || data.error) {
    nowHasTrack = false;
    nowPlaying  = false;
  } else {
    const { item, is_playing, progress_ms } = data;
    if (!item) return;
    nowPlaying = !!is_playing;
    startTick(progress_ms, item.duration_ms);

    if (item.id !== lastTrackId) {
      lastTrackId = item.id;
      $trackName.textContent = item.name;
      $trackName.classList.remove('marquee');
      requestAnimationFrame(() => {
        const wrap = document.getElementById('track-name-wrap');
        if ($trackName.scrollWidth > wrap.clientWidth) {
          $trackName.classList.add('marquee');
        }
      });

      const artistText = item.artists.map(a => a.name).join(' · ').trim();
      $artistName.textContent = artistText;

      // Stats-screen strip: trim trailing separators when artist
      // is empty (e.g. SMTC sources that don't expose channel).
      const stripDisplay = artistText
        ? `${item.name} · ${artistText}`
        : item.name;
      $stripText.textContent = stripDisplay;
      $stripText.classList.remove('marquee');
      requestAnimationFrame(() => {
        if ($stripText.scrollWidth > $stripWrap.clientWidth) {
          $stripText.classList.add('marquee');
        }
      });

      const artUrl = item.album.images[0]?.url;
      console.info('[KrakenDisp] track:', item.name,
                   '· source:', data._source || 'spotify',
                   '· art:', artUrl ? 'yes' : 'NO');

      if (artUrl) {
        // Source has art — load and apply.
        document.body.classList.remove('no-art');
        $artImg.classList.remove('loaded');
        const palette = await extractPalette(artUrl);
        applyPalette(palette);
        $artImg.onload  = () => $artImg.classList.add('loaded');
        $artImg.onerror = () => {
          console.warn('[KrakenDisp] art failed to render — placeholder.');
          document.body.classList.add('no-art');
          applyDefaultPalette();
        };
        $artImg.src = artUrl;
      } else {
        // No art — wipe everything from the previous source.
        document.body.classList.add('no-art');
        $artImg.classList.remove('loaded');
        $artImg.removeAttribute('src');
        $bgBlur.style.backgroundImage = '';
        applyDefaultPalette();
      }
    }
  }

  // Apply state classes once per render
  document.body.classList.toggle('paused', !nowPlaying);
  document.body.classList.toggle('no-track', !nowHasTrack);

  // Detect transitions and react (3s pause→stats, etc.)
  const trackAvailabilityChanged = nowHasTrack !== hasTrack;
  const playStateChanged         = nowPlaying  !== prevPlaying;

  isPlaying = nowPlaying;
  hasTrack  = nowHasTrack;

  if (playStateChanged || trackAvailabilityChanged || !firstRenderDone) {
    onPlaybackTransition();
    firstRenderDone = true;
  }
  prevPlaying = nowPlaying;

  if (!nowHasTrack) setRing(0);
}

// ═══════════════════════════════════════════════════════════
//  Main loop — combines Spotify with SMTC fallback.
//
//  Priority:
//    1. Spotify actively playing  → Spotify
//    2. SMTC actively playing     → SMTC  (e.g. YouTube)
//    3. Spotify paused with track → Spotify
//    4. SMTC has any media        → SMTC
//    5. Nothing                   → empty (stats screen takes over)
// ═══════════════════════════════════════════════════════════
async function poll() {
  try {
    // Run both lookups in parallel — they're independent.
    const [spotify, smtc] = await Promise.all([
      getCurrentlyPlaying().catch(() => null),
      getSmtcMedia().catch(() => null),
    ]);

    if (spotify?.error === 'no_token') return;

    const spotifyHasItem = spotify && spotify.item;
    const spotifyPlaying = spotifyHasItem && spotify.is_playing;
    const smtcHasItem    = smtc && smtc.has_session && smtc.title;
    const smtcPlaying    = smtcHasItem && smtc.playing;

    let chosen;
    if      (spotifyPlaying) chosen = spotify;
    else if (smtcPlaying)    chosen = smtcToSpotifyShape(smtc);
    else if (spotifyHasItem) chosen = spotify;
    else if (smtcHasItem)    chosen = smtcToSpotifyShape(smtc);
    else                     chosen = { empty: true };

    await render(chosen);
  } catch (e) {
    console.warn('Poll error:', e);
  }
}

async function init() {
  const params = new URLSearchParams(location.search);
  const code   = params.get('code');

  if (code) {
    history.replaceState({}, '', '/');
    await fetchTokens({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      code_verifier: localStorage.getItem('pkce_v') || '',
    });
  }

  if (localStorage.getItem('rt')) {
    $idleScreen.style.display = 'none';
    await poll();
    setInterval(poll, 3000);
  }
}

window.redirectToSpotify = redirectToSpotify;
init();
</script>
</body>
